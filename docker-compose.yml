version: '3.8'

services:
  backend:
    build: ./backend
    container_name: tani_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    networks:
      - tani_network

  frontend:
    build: ./frontend
    container_name: tani_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - tani_network

networks:
  tani_network:
    driver: bridge