services:
  backend:
    build: ./backend  # <-- Titik masalahnya di sini, sekarang sudah diarahkan ke folder backend
    container_name: tani_backend
    ports:
      - "5000:5000"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml # <-- Jalur ini juga disesuaikan
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: always